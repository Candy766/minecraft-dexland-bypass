name: build

on: [pull_request, push]

jobs:
  build:
    strategy:
      matrix:
        java-version: [21]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
      - run: chmod +x gradlew
      - run: ./gradlew build
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: Artifacts
          path: build/libs/
